<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
  <link rel="stylesheet" href="style45.css">
  <title>Solar System Explorer</title>
</head>
<body>
  <h1 class="logo">
    Solar explorer
    <span>in only CSS</span>
  </h1>

  <input class="planet9" id="pluto" type="radio" name="planet">
  <label class="menu pluto" for="pluto">
    <div class="preview"></div>
    <div class="info">
      <h2>
        <div class="pip"></div>
        Pluto
      </h2>
      <h3>39.5 AU</h3>
    </div>
  </label>

  <input class="planet8" id="neptune" type="radio" name="planet">
  <label class="menu neptune" for="neptune">
    <div class="preview"></div>
    <div class="info">
      <h2>
        <div class="pip"></div>
        Neptune
      </h2>
      <h3>30.06 AU</h3>
    </div>
  </label>

  <input class="planet7" id="uranus" type="radio" name="planet">
  <label class="menu uranus" for="uranus">
    <div class="preview"></div>
    <div class="info">
      <h2>
        <div class="pip"></div>
        Uranus
      </h2>
      <h3>19.18 AU</h3>
    </div>
  </label>

</body>
</html>
